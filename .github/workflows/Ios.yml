name: Build iOS Dev IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Ren'Py
        uses: remarkablegames/setup-renpy@v1
        with:
          renios: true

      - name: Generate Xcode Project
        run: |
          # Generiert das Xcode-Projekt
          renpy-launcher ios_create . ./ios-build
          
      - name: Build Xcode Project (Unsigned)
        run: |
          cd ios-build
          
          # Das generierte Xcode-Projekt dynamisch auslesen
          XCODEPROJ=$(find . -name "*.xcodeproj" | head -n 1)
          
          # Lese den tatsächlichen Scheme-Namen dynamisch aus dem Projekt aus
          SCHEME=$(xcodebuild -list -project "$XCODEPROJ" -json | jq -r '.project.schemes[0]')
          
          echo "Gefundenes Projekt: $XCODEPROJ"
          echo "Gefundenes Scheme: $SCHEME"
          
          # Sicherheits-Check (MIT KORREKTEM LEERZEICHEN: "if [")
          if [ "$SCHEME" = "null" ] ||[ -z "$SCHEME" ]; then
            echo "Fehler: Kein Scheme gefunden!"
            xcodebuild -list -project "$XCODEPROJ"
            exit 1
          fi
          
          # Build-Prozess OHNE Signierung
          xcodebuild clean build \
            -project "$XCODEPROJ" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SYMROOT="$(pwd)/build"
            
      - name: Package to Dev IPA
        run: |
          cd ios-build
          
          # Sucht die fertig gebaute .app Datei
          APP_DIR=$(find build/Release-iphoneos -name "*.app" | head -n 1)
          
          # Sicherheits-Check, ob die App wirklich gebaut wurde
          if [ -z "$APP_DIR" ]; then
            echo "Fehler: Keine kompilierte .app Datei gefunden!"
            exit 1
          fi
          
          echo "Verpacke $APP_DIR zu einer IPA..."
          
          # Struktur der IPA erstellen und packen
          mkdir -p Payload
          cp -R "$APP_DIR" Payload/
          zip -qr ../100faust-chan.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Dev-IPA
          path: 100faust-chan.ipa
          retention-days: 7
